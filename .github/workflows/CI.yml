name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Matches humane-kotlin's own jvmToolchain(17).
          java-version: "17"

      # Single checkout is enough now that com.netpress.kotidy resolves from
      # gradlePluginPortal() (version "0.1.0", approved on the Portal) --
      # no more sibling checkout of kotidy needed now that it's not a
      # composite build. See docs/COWORK.md.
      - name: Run checks
        # clean check, not make check -- CI should fail loudly on a style
        # violation, not silently auto-fix it via ktlintFormat and pass
        # anyway. check already runs ktlintCheck + test together.
        run: ./gradlew clean check
